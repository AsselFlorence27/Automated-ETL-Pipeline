name: Daily HackerNews ETL

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        env:
          PYTHONPATH: .
        run: pytest tests/

      - name: Run ETL Pipeline
        env:
          PYTHONPATH: .
        run: python -m src.main

      - name: Commit database changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.db
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update hackernews database"
          git push
